<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Mirror - Dil Seçimi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://geniusmetaverse-max.github.io/geniusmetaverse/magicmirror/magicmirror.png') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Arial', 'Helvetica', sans-serif;
      color: white;
      text-align: center;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.50); /* Daha güçlü karartma – metin net okunsun */
      z-index: 1;
    }
    .container {
      max-width: 500px;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: 3.2rem;
      margin: 0 0 20px;
      letter-spacing: 3px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.7);
      color: #ffd700;
    }
    p.subtitle {
      font-size: 1.4rem;
      margin: 0 0 50px;
      opacity: 0.95;
      line-height: 1.5;
    }
    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .lang-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
      padding: 18px 40px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #000;
      background: #ffd700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
    }
    .lang-btn:hover {
      background: #ffeb3b;
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(255, 215, 0, 0.6);
    }
    .footer {
      position: absolute;
      bottom: 25px;
      left: 0; right: 0;
      font-size: 0.9rem;
      opacity: 0.8;
      z-index: 2;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>MAGIC MIRROR</h1>
    <p class="subtitle">Please select your language / Lütfen dilinizi seçin</p>

    <div class="lang-buttons">
      <a href="welcome-en.html" class="lang-btn">English</a>
      <a href="welcome-tr.html" class="lang-btn">Türkçe</a>
    </div>
  </div>

  <div class="footer">
    © 2026 Magic Mirror - Bridal AI • All rights reserved • Powered by GeniusMetaverse
  </div>

</body>
</html>
