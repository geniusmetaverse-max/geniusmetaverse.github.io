<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordLegend - About Us</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: url("WL_Background.png") no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 60px 20px 20px;
      position: relative;
    }

    header img.logo {
      width: 200px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); }
    }

    .about-section {
      max-width: 900px;
      margin: 60px auto;
      padding: 30px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: fadeIn 1.5s ease;
    }

    .about-section p {
      line-height: 1.8;
      font-size: 1.1rem;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.9rem;
      color: #ccc;
    }
  </style>
</head>
<body>

  <header>
    <!-- Logo image -->
    <img src="WL_Logo.png" alt="WordLegend Logo" class="logo">
  </header>

  <section class="about-section">
    <p>
      WordLegend is a modern and addictive word game developed for word enthusiasts. 
      With different game modes, dynamic visuals, and rewards, it appeals to players of all levels and helps you enjoy your time while expanding your vocabulary.
    </p>
  </section>

  <footer>
    WordLegend © 2026 - All Rights Reserved.
  </footer>

</body>
</html>
